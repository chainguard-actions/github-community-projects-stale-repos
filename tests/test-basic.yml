name: Test basic usage - scan with high inactive days
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          INACTIVE_DAYS: "36500"
          SKIP_EMPTY_REPORTS: "true"
      - name: Assert action completed or failed gracefully
        env:
          OUTCOME: ${{ steps.action.outcome }}
          INACTIVE_REPOS: ${{ steps.action.outputs.inactiveRepos }}
        run: |
          echo "action outcome: '$OUTCOME'"
          echo "inactiveRepos output: '$INACTIVE_REPOS'"
          # With INACTIVE_DAYS=36500 (100 years) and SKIP_EMPTY_REPORTS=true,
          # no repos should be stale so output should be empty (not set).
          # The action should NOT output "null" on success.
          if [ "$OUTCOME" = "success" ] && [ "$INACTIVE_REPOS" = "null" ]; then
            echo "FAIL: action succeeded but output was 'null'"
            exit 1
          fi
          echo "PASS: action completed (outcome=$OUTCOME)"
