name: Test error handling - missing GH_TOKEN
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          GH_TOKEN: ""
          INACTIVE_DAYS: "365"
      - name: Assert action failed due to missing token
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: '$OUTCOME'"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when GH_TOKEN is not set, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when GH_TOKEN was not provided"
