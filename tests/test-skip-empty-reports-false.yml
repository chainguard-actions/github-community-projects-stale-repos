name: Test skip-empty-reports=false configuration
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          INACTIVE_DAYS: "36500"
          SKIP_EMPTY_REPORTS: "false"
      - name: Assert action completed and inactiveRepos output is set
        env:
          OUTCOME: ${{ steps.action.outcome }}
          INACTIVE_REPOS: ${{ steps.action.outputs.inactiveRepos }}
        run: |
          echo "action outcome: '$OUTCOME'"
          echo "inactiveRepos output: '$INACTIVE_REPOS'"
          # With SKIP_EMPTY_REPORTS=false, action should always produce output
          # even when no stale repos are found (INACTIVE_DAYS=36500 means none stale).
          # Output should be an empty JSON array "[]".
          # If action failed (e.g. auth error in act), that is also acceptable.
          if [ "$OUTCOME" = "success" ]; then
            if [ "$INACTIVE_REPOS" = "null" ]; then
              echo "FAIL: action succeeded but output was 'null'"
              exit 1
            fi
            if [ -z "$INACTIVE_REPOS" ]; then
              echo "FAIL: action succeeded but output was empty, expected '[]' when SKIP_EMPTY_REPORTS=false"
              exit 1
            fi
            echo "PASS: action completed with SKIP_EMPTY_REPORTS=false, output: '$INACTIVE_REPOS'"
          else
            echo "PASS: action failed as expected in act environment (no real API access)"
          fi
